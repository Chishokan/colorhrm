name: Deploy to Xserver

# app/ 配下のPHPを Xサーバーへ FTPS デプロイする。
# - main への push（app/ 配下の変更時）に自動実行
# - 手動実行（workflow_dispatch）も可。dry-run で「何が上がるか」だけ確認できる
#
# ★DBマイグレーション（migrations/*.sql）は対象外。
#   スキーマ変更は phpMyAdmin で手動実行してから、このデプロイを流すこと。
#
# 必要な GitHub Secrets（Settings → Secrets and variables → Actions）:
#   FTP_SERVER    … FTPホスト名（例: sv8550.xserver.jp。サーバーパネル［FTPアカウント設定］のホスト）
#   FTP_USERNAME  … FTPユーザー名
#   FTP_PASSWORD  … FTPパスワード
# 任意の Variables:
#   FTP_SERVER_DIR … 配置先（既定: /chishokan.co.jp/public_html/colorhrm/）。
#                    ※FTPアカウントのホーム基準。末尾スラッシュ必須。

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run（アップロードせず差分の一覧だけ表示）'
        type: boolean
        default: false

# 同時に複数のデプロイが走らないようにする
concurrency:
  group: deploy-xserver
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # FTP の制御ソケットが一時的にタイムアウトすることがあるため、最大3回まで再試行する。
      # 1・2回目は continue-on-error で失敗を握りつぶし、最後の3回目で本当に失敗ならジョブを失敗させる。
      # 状態ファイルにより、再試行は残りの差分だけを送るので速い。
      - name: FTPS Deploy (try 1)
        id: ftp1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./app/
          server-dir: ${{ vars.FTP_SERVER_DIR || '/chishokan.co.jp/public_html/colorhrm/' }}
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          exclude: |
            **/config.php
            **/config.php.example
            **/README.md
            **/.git*
            **/.DS_Store

      - name: Wait before retry 2
        if: steps.ftp1.outcome == 'failure'
        run: sleep 15

      - name: FTPS Deploy (try 2)
        id: ftp2
        if: steps.ftp1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./app/
          server-dir: ${{ vars.FTP_SERVER_DIR || '/chishokan.co.jp/public_html/colorhrm/' }}
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          exclude: |
            **/config.php
            **/config.php.example
            **/README.md
            **/.git*
            **/.DS_Store

      - name: Wait before retry 3
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        run: sleep 30

      - name: FTPS Deploy (try 3, final)
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./app/
          server-dir: ${{ vars.FTP_SERVER_DIR || '/chishokan.co.jp/public_html/colorhrm/' }}
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          exclude: |
            **/config.php
            **/config.php.example
            **/README.md
            **/.git*
            **/.DS_Store
